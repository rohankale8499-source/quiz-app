{% extends 'quiz/base.html' %}
{% block title %}Home{% endblock %}

{% block content %}

<div class="glass-section">

<h2 class="text-center fw-bold mb-5">🎯 Select Quiz Category</h2>

<div class="row">

{% for category in categories %}
<div class="col-md-4 mb-4">

<div class="card shadow border-0 h-100 text-center"
style="border-radius:20px; transition:.3s;">

<div class="card-body d-flex flex-column justify-content-center">

<h4 class="fw-bold">{{ category.name }}</h4>

<p class="text-muted">
Test your knowledge in {{ category.name }}
</p>

<a href="{% url 'quiz' category.id %}"
class="btn btn-primary btn-lg mt-auto"
style="border-radius:12px;">
🚀 Start Quiz
</a>

</div>

</div>

</div>
{% endfor %}

</div>

</div>

{% endblock %}
