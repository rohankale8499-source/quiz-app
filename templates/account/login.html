{% load socialaccount %}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
height:100vh;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
display:flex;
align-items:center;
justify-content:center;
}

.login-card{
background:white;
padding:40px;
border-radius:18px;
width:420px;
box-shadow:0 25px 60px rgba(0,0,0,0.4);
animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
from{transform:translateY(30px);opacity:0;}
to{transform:translateY(0);opacity:1;}
}

.google-btn{
background:white;
border:2px solid #eee;
padding:12px;
border-radius:10px;
font-weight:600;
transition:0.3s;
}

.google-btn:hover{
background:#f8f9fa;
transform:scale(1.03);
box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.project-info{
font-size:13px;
color:#777;
text-align:center;
margin-top:20px;
}
</style>
</head>

<body>

<div class="login-card">

<h3 class="text-center mb-4 fw-bold">🧠 Quiz Login</h3>

<form method="post">
{% csrf_token %}

{{ form.non_field_errors }}

<div class="mb-3">
<label>Username</label>
{{ form.login }}
</div>

<div class="mb-3">
<label>Password</label>
{{ form.password }}
</div>

<div class="d-grid mb-3">
<button class="btn btn-primary btn-lg">Login</button>
</div>

</form>

<div class="text-center mb-3">OR</div>

<div class="d-grid">
<a href="{% provider_login_url 'google' %}" class="google-btn text-center text-decoration-none">
<img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" width="22">
Login with Google
</a>
</div>

<p class="text-center mt-3">
Don’t have account ?
<a href="/accounts/signup/">Register</a>
</p>

<div class="project-info">
Web-Based Quiz Application using Django <br>
Developed by Rohan V Kale & Yuvraj Mulik
</div>

</div>

</body>
</html>
